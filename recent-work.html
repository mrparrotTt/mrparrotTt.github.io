<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Recent Work | Battle Born Flags</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0f0f0f;
      color: white;
    }

    nav {
      background: #050505;
      padding: 15px 20px;
      text-align: center;
      position: sticky;
      top: 0;
      z-index: 1000;
      border-bottom: 1px solid #333;
    }

    nav a {
      color: white;
      text-decoration: none;
      margin: 0 15px;
      font-weight: bold;
    }

    nav a:hover {
      color: #d6b36a;
    }

    .section {
      max-width: 1100px;
      margin: auto;
      padding: 50px 20px;
    }

    h1 {
      font-size: 42px;
      text-align: center;
    }

    .gallery {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 25px;
      margin-top: 30px;
    }

    .gallery-card {
      background: #1a1a1a;
      border-radius: 12px;
      border: 1px solid #333;
      padding: 20px;
      text-align: center;
    }

    .gallery-card img {
      width: 100%;
      height: 520px;
      object-fit: contain;
      border-radius: 12px;
      border: 2px solid #333;
      transform: rotate(-90deg);
    }

    .gallery-card h3 {
      color: #d6b36a;
    }

    footer {
      background: #050505;
      text-align: center;
      padding: 30px;
      color: #aaa;
    }
  </style>
</head>

<body>

<nav>
  <a href="index.html">Home</a>
  <a href="order.html">Order Now</a>
  <a href="recent-work.html">Recent Work</a>
</nav>

<section class="section">
  <h1>Recent Work</h1>

  <p style="text-align:center;">
    Here are examples of wooden flags made by Battle Born Flags.
  </p>

  <div class="gallery">

    <div class="gallery-card">
      <img src="wood-stripe-flag.jpg" alt="Wood stripe wavy flag">
      <h3>Wavy Wood Stripe Flag</h3>
    </div>

    <div class="gallery-card">
      <img src="white-stripe-flag.jpg" alt="White stripe wavy flag">
      <h3>Wavy White Stripe Flag</h3>
    </div>

  </div>
</section>

<footer>
  <p>Battle Born Flags</p>
  <p>battlebornflags@gmail.com</p>
</footer>

</body>
</html>
